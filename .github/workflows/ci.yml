name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - name: Ruff
        run: uv run --python 3.10 --with pytest --with ruff ruff check src tests scripts/convert_checkpoint.py scripts/validate_release.py scripts/smoke_inference.py
      - name: Tests
        run: uv run --python 3.10 --with pytest pytest -q
      - name: Release guard
        run: uv run --python 3.10 python scripts/validate_release.py
